        description: "Agriculture tractors (SEARCH_ID_AGRICULTURE_TRACTOR)."
        no_auth: true
        response_path: docs
        params:
          - {name: q, flag_name: query, type: string, description: "Free-text query."}
          - {name: location, type: string, description: "Swedish region/county id."}
          - {name: price_from, type: int, description: "Minimum price."}
          - {name: price_to, type: int, description: "Maximum price."}
          - {name: page, type: int, default: 1, description: "Page number."}
        response: {type: object, item: SearchResponse}
      tools:
        method: GET
        path: "/mobility/search/api/search/SEARCH_ID_AGRICULTURE_TOOL"
        description: "Agriculture tools (SEARCH_ID_AGRICULTURE_TOOL)."
        no_auth: true
        response_path: docs
        params:
          - {name: q, flag_name: query, type: string, description: "Free-text query."}
          - {name: location, type: string, description: "Swedish region/county id."}
          - {name: price_from, type: int, description: "Minimum price."}
          - {name: price_to, type: int, description: "Maximum price."}
          - {name: page, type: int, default: 1, description: "Page number."}
        response: {type: object, item: SearchResponse}
      combines:
        method: GET
        path: "/mobility/search/api/search/SEARCH_ID_AGRICULTURE_THRESHING"
        description: "Agriculture combines / threshing machines (SEARCH_ID_AGRICULTURE_THRESHING)."
        no_auth: true
        response_path: docs
        params:
          - {name: q, flag_name: query, type: string, description: "Free-text query."}
          - {name: location, type: string, description: "Swedish region/county id."}
          - {name: price_from, type: int, description: "Minimum price."}
