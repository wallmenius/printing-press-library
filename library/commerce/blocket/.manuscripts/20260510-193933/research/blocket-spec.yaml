          - {name: location, type: string, description: "Swedish region/county id."}
          - {name: price_from, type: int, description: "Minimum price."}
          - {name: price_to, type: int, description: "Maximum price."}
          - {name: page, type: int, default: 1, description: "Page number."}
        response: {type: object, item: SearchResponse}

extra_commands:
  - name: search-all
    description: "Cross-vertical free-text search across BAP, cars, boats, MCs, and the niche mobility verticals from the local store."
  - name: since
    description: "List ads added since a timestamp for a stored named-search; cron-friendly typed exit codes."
  - name: arbitrage
    description: "Find current listings priced ≤ threshold × median for their (make, model, year-band, mileage-band) cohort."
  - name: price-history
    description: "Show all snapshotted prices for an ad over time with deltas, populated by sync re-fetching tracked ads."
  - name: dealer
    description: "Dealer portfolio commands — list ads, aggregate stats, and turnover analysis by org_id."
  - name: stale
    description: "Listings older than N days that are still active in the most recent sync."
  - name: watch
    description: "Stored named-searches with sync, run, and price-drop notification commands."
  - name: desc-grep
    description: "Match a Go regular expression against ad descriptions backfilled into the local store."
  - name: geo
    description: "Geo radius search — filter synced ads by point + radius using haversine distance."
  - name: appraise
    description: "Compute p10/p50/p90 of asking prices for a comparable vehicle set from the synced corpus."
  - name: filters
    description: "List valid filter values for a vertical by probing one search response — agents introspect the filter set."

types:
  SearchResponse:
    fields:
      - name: docs
        type: array
        description: "Listings matching the query."
      - name: filters
        type: array
        description: "Filter tree describing the valid filter values for the result set."
      - name: metadata
        type: object
        description: "Result metadata: paging, search_key, vertical, sort, descriptions, tracking."

  AdDetail:
    fields:
      - name: itemData
        type: object
        description: "Full ad payload — title, location, description, images, seller, attributes."
      - name: isPreview
        type: bool
        description: "True when the ad is a preview/draft, not a live listing."
